name: Deploy Live Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14

      - name: Build WebAssembly module
        run: |
          ${{ github.workspace }}/js/build-wasm.sh
          cmake --build ${{ github.workspace }}/build-js-wasm --target vibra_wasm_global -j

      - name: Prepare Pages artifact
        run: |
          rm -rf pages-site
          mkdir -p pages-site
          cp live-demo/index.html pages-site/index.html
          cp -R live-demo/public pages-site/public
          cp build-js-wasm/js/live-demo/vibra.js pages-site/public/vibra.js
          cp build-js-wasm/js/live-demo/vibra.wasm pages-site/public/vibra.wasm
          touch pages-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
