name: Build CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  precheck:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake cpplint

      - name: Check cpplint
        run: cpplint --recursive lib include

      - name: Configure unit tests
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DLIBRARY_ONLY=ON

      - name: Build unit tests
        run: cmake --build build --target vibra_unit_tests

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure
