name: CI macOS AMD64

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  ci-macos-amd64:
    runs-on: macos-13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure release build
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SUFFIX=macos-amd64
          -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config Release

      - name: Configure unit tests
        run: >
          cmake -B build-test
          -DCMAKE_BUILD_TYPE=Debug
          -DLIBRARY_ONLY=ON
          -DBUILD_TESTING=ON

      - name: Build unit tests
        run: cmake --build build-test --target vibra_unit_tests --config Debug

      - name: Run unit tests
        run: ctest --test-dir build-test -C Debug --output-on-failure

      - name: Check build results
        run: |
          file build/cli/vibra*
          file build/lib/libvibra*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibra-macos-amd64
          path: |
            build/cli/vibra*
            build/lib/libvibra*
