name: CI Linux ARM64

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  ci-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SUFFIX=linux-arm64
          -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config Release

      - name: Configure unit tests
        run: cmake -B build-test -DCMAKE_BUILD_TYPE=Debug -DLIBRARY_ONLY=ON

      - name: Build unit tests
        run: cmake --build build-test --target vibra_unit_tests --config Debug

      - name: Run unit tests
        run: ctest --test-dir build-test -C Debug --output-on-failure

      - name: Check build results
        run: |
          file build/cli/vibra*
          file build/lib/libvibra*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibra-linux-arm64
          path: |
            build/cli/vibra*
            build/lib/libvibra*
